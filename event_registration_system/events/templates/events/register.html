<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>
</head>
<body>

    <h1>Event Registration Form</h1>

    {% if success %}
        <p>Registration Successful!</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>

    </form>

</body>
</html>
